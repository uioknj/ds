name: Build and Push to GitHub Registry

on:
 push:
 branches:
 - main
 - master

jobs:
 build:
 runs-on: ubuntu-latest
 # 这一段很重要：赋予 GitHub 自动推送镜像的权限
 permissions:
 contents: read
 packages: write

 steps:
 - name: Check out code
 uses: actions/checkout@v4

 # 登录到 GitHub 自带的镜像仓库 (不需要你手动配密码，它会自动读取内置 Token)
 - name: Log in to GitHub Container Registry
 uses: docker/login-action@v3
 with:
 registry: ghcr.io
 username: ${{ github.actor }}
 password: ${{ secrets.GITHUB_TOKEN }}

 # 构建并推送到 GitHub
 - name: Build and push Docker image
 uses: docker/build-push-action@v5
 with:
 context: .
 push: true
 # 【注意！】把下面的 "你的用户名" 改成你的 GitHub 账号名字（必须全部小写！）
 tags: ghcr.io/uioknj/ds:latest 
